# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                   : "en-US"
title                    : "Integrity Studio"
title_separator          : "-"
name                     : &name "Integrity Studio"
description              : &description "AI observability, trust infrastructure, and measurable systems"
url                      : "https://integritystudio.ai"
baseurl                  : ""
repository               : "integritystudio/integritystudio.github.io"

# Site Author
author:
  avatar           : "logo.png"
  name             : "Integrity Studio"
  bio              : "AI observability + trust infrastructure"
  location         : "Austin, TX"
  employer         : "Integrity Studio"
  uri              : "https://integritystudio.ai"
  email            : "hello@integritystudio.ai"

  github           : "integritystudio"
  linkedin         : "company/integrity-studio-ai"

# -----------------------------------
# 🔹 Collections
# -----------------------------------
collections:
  products:
    output: true
    permalink: /products/:path/

  research:
    output: true
    permalink: /research/:path/

  architecture:
    output: true
    permalink: /architecture/:path/

  insights:
    output: true
    permalink: /insights/:path/

# -----------------------------------
# 🔹 Defaults for Collections
# -----------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: products
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: research
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: architecture
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: insights
    values:
      layout: single
      author_profile: true

# -----------------------------------
# 🔹 Assets 
# -----------------------------------
# Asset Category
asset_category:
  site:
    title: 'Public Facing Site'
  product:
    title: 'Consumer Facing Product'    
  tool:
    title: 'Internal Tool'

site:
  reports                      : "https://integritystudio.io/" # one-off analytics and research reports 
  quality-metrics-dashboard    : "https://integritystudio.dev/" # UI for observability toolkit - beta
  IntegrityLandingPage         : "https://integritystudio.ai/" # public-facing landing page
  schema-org-file-system       : "https://integritystudio.pro/" # UI for ML & OCR & computer vision driven organization system
  tcad-scraper                 : "https://alephatx.info/" # UI for austin real estate data
  CodeInventory                : "https://integrityaistudio.com/" # example automated code quality analysis report - not actively maintained
  AlephAuto                    : "https://n0ai.app/" # not actively maintained
  ai-observability-html        : "https://integritystudio.github.io/ai-observability-html/" # continuously updated observability market reports

# Published Products - Backend (no UI)
product:
   observability-toolkit        : "https://github.com/integritystudio/observability-toolkit" # mcp server and npm package

# Published Internal Tools (no UI) 
tool:
  bot-army-google-calendar-mcp        : "https://github.com/integritystudio/bot-army-google-calendar-mcp"
  dev-env-analyzer                    : "https://github.com/integritystudio/dev-env-analyzer"
  demo-creator                        : "https://github.com/integritystudio/demo-creator"  

# -----------------------------------
# 🔹 Site Settings
# -----------------------------------
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"

# -----------------------------------
# 🔹 SEO + Social
# -----------------------------------
social:
  type                   : Organization
  name                   : Integrity Studio
  links:
    - "https://github.com/integritystudio"
    - "https://integritystudio.ai"
    - "https://www.linkedin.com/company/integrity-studio-ai"

og_image                 : "/assets/images/social-preview.png"


# SEO Related - TODO
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :


# Social Sharing - TODO
twitter:
  username               : &twitter
facebook:
  username               :
  app_id                 :
  publisher              :


# Analytics
analytics:
  provider               :  "false" # false (default), "google", "google-universal", "google-analytics-4", "custom"
  google:
    tracking_id          :


# -----------------------------------
# 🔹 Includes / Excludes
# -----------------------------------
include:
  - _pages
  - files

exclude:
  - node_modules
  - vendor
  - tmp
  - log
  - .sass-cache
  - .jekyll-cache
  - .github


# -----------------------------------
# 🔹 Sass / Styling
# -----------------------------------
sass:
  sass_dir: _sass
  style: compressed


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# -----------------------------------
# 🔹 Archives
# -----------------------------------
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/


# Outputting
permalink: /:categories/:title/
# paginate: 5 # amount of posts to show
# paginate_path: /page:num/
timezone: UTC # http://en.wikipedia.org/wiki/List_of_tz_database_time_zones


# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji


# HTML Compression
# - http://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development
